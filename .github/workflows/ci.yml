name: Orbit CI

on:
  push:
    branches: [main, "feature/**", "fix/**", "test/**"]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            google-genai \
            redis \
            psycopg2-binary \
            httpx \
            fastapi \
            uvicorn \
            pydantic \
            python-dotenv \
            numpy \
            pytest \
            pytest-asyncio \
            pytest-mock \
            pytest-json-report

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v \
            --json-report --json-report-file=test-results/unit-results.json \
            --tb=short

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results/unit-results.json

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            google-genai \
            redis \
            psycopg2-binary \
            httpx \
            fastapi \
            uvicorn \
            pydantic \
            python-dotenv \
            numpy \
            pytest \
            pytest-asyncio \
            pytest-mock \
            pytest-json-report

      - name: Run integration tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          pytest tests/integration/ -v \
            --json-report --json-report-file=test-results/integration-results.json \
            --tb=short

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: test-results/integration-results.json

  evals:
    name: Evals
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            google-genai \
            redis \
            psycopg2-binary \
            httpx \
            fastapi \
            uvicorn \
            pydantic \
            python-dotenv \
            numpy \
            pytest \
            pytest-asyncio \
            pytest-mock \
            pytest-json-report

      - name: Run evals
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY not set — skipping live evals, running mock evals only"
            pytest evals/ -v --tb=short --ignore=evals/orchestrator --ignore=evals/mentor_agent --ignore=evals/tracker_agent || true
          else
            pytest evals/ -v --tb=short \
              --json-report --json-report-file=test-results/eval-results.json
          fi

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: test-results/

  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: evals
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check if dashboard exists
        id: check_dash
        run: |
          if [ -f "dashboard/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Dashboard not built yet — skipping Playwright"
          fi

      - name: Install dashboard deps
        if: steps.check_dash.outputs.exists == 'true'
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright + Chromium
        if: steps.check_dash.outputs.exists == 'true'
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        if: steps.check_dash.outputs.exists == 'true'
        working-directory: dashboard
        run: npx playwright test --reporter=html,json

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            test-results/playwright/report.html
            test-results/playwright/results.json
            test-results/playwright/screenshots/
            test-results/playwright/videos/
