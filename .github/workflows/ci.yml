name: Orbit CI

on:
  push:
    branches: [main, "feature/**", "fix/**", "test/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install google-genai redis psycopg2-binary httpx fastapi \
            uvicorn pydantic python-dotenv numpy pytest pytest-asyncio \
            pytest-mock pytest-json-report

      - name: Run unit tests
        run: |
          mkdir -p test-results
          pytest tests/unit/ -v \
            --json-report --json-report-file=test-results/unit-results.json \
            --tb=short

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results/unit-results.json

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install google-genai redis psycopg2-binary httpx fastapi \
            uvicorn pydantic python-dotenv numpy pytest pytest-asyncio \
            pytest-mock pytest-json-report

      - name: Run integration tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
        run: |
          mkdir -p test-results
          pytest tests/integration/ -v \
            --json-report --json-report-file=test-results/integration-results.json \
            --tb=short

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: test-results/integration-results.json

  evals:
    name: Evals
    runs-on: ubuntu-latest
    needs: integration-tests
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install google-genai redis psycopg2-binary httpx fastapi \
            uvicorn pydantic python-dotenv numpy pytest pytest-asyncio \
            pytest-mock pytest-json-report

      - name: Run evals
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          mkdir -p test-results
          pytest evals/ -v \
            --json-report --json-report-file=test-results/eval-results.json \
            --tb=short

      - name: Commit eval results back to repo
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "ushanagallashashank"
          git config user.email "ushanagallashashank@gmail.com"
          git pull --rebase origin main
          git add evals/orchestrator/eval_results.jsonl \
                  evals/mentor_agent/eval_results.jsonl \
                  evals/tracker_agent/eval_results.jsonl
          git diff --staged --quiet || git commit \
            -m "test: eval results — run ${{ github.run_id }} — $(date +%Y-%m-%d)"
          git push origin main

      - name: Upload eval artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: |
            test-results/eval-results.json
            evals/orchestrator/eval_results.jsonl
            evals/mentor_agent/eval_results.jsonl
            evals/tracker_agent/eval_results.jsonl

  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: evals
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard deps
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright + Chromium
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: dashboard
        run: npx playwright test --reporter=html,json,list

      - name: Copy results to test-results/playwright
        if: always()
        run: |
          mkdir -p test-results/playwright/screenshots
          cp -r dashboard/playwright-report/. test-results/playwright/ 2>/dev/null || true
          cp dashboard/test-results/results.json test-results/playwright/ 2>/dev/null || true
          cp -r dashboard/test-results/*/test-finished-*.png \
                test-results/playwright/screenshots/ 2>/dev/null || true

      - name: Commit Playwright results back to repo
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "ushanagallashashank"
          git config user.email "ushanagallashashank@gmail.com"
          git pull --rebase origin main
          git add test-results/playwright/results.json \
                  test-results/playwright/screenshots/ || true
          git diff --staged --quiet || git commit \
            -m "test: playwright results — dashboard — pass — $(date +%Y-%m-%d)"
          git push origin main

      - name: Upload Playwright artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: test-results/playwright/

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, evals, playwright]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## Orbit CI Results — run ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests     | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration    | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Evals          | ${{ needs.evals.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Playwright     | ${{ needs.playwright.result }} |" >> $GITHUB_STEP_SUMMARY
