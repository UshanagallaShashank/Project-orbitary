name: Orbit CI

on:
  push:
    branches: [main, "feature/**", "fix/**", "test/**"]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-genai==1.70.0 redis==7.4.0 psycopg2-binary==2.9.11 \
            httpx==0.28.1 fastapi==0.135.3 uvicorn==0.42.0 pydantic==2.12.5 \
            python-dotenv numpy pytest==9.0.2 pytest-asyncio==1.3.0 pytest-mock==3.15.1

      - name: Run unit tests
        run: pytest tests/unit/ -v

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-genai==1.70.0 redis==7.4.0 psycopg2-binary==2.9.11 \
            httpx==0.28.1 fastapi==0.135.3 uvicorn==0.42.0 pydantic==2.12.5 \
            python-dotenv numpy pytest==9.0.2 pytest-asyncio==1.3.0 pytest-mock==3.15.1

      - name: Run integration tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: pytest tests/integration/ -v

  evals:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-genai==1.70.0 redis==7.4.0 psycopg2-binary==2.9.11 \
            httpx==0.28.1 fastapi==0.135.3 uvicorn==0.42.0 pydantic==2.12.5 \
            python-dotenv numpy pytest==9.0.2 pytest-asyncio==1.3.0 pytest-mock==3.15.1

      - name: Run evals (skip if no GEMINI_API_KEY)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "No GEMINI_API_KEY — skipping live evals"
          else
            pytest evals/ -v --tb=short
          fi

  playwright:
    runs-on: ubuntu-latest
    needs: evals
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check dashboard exists
        id: check_dashboard
        run: |
          if [ -f "dashboard/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dashboard deps
        if: steps.check_dashboard.outputs.exists == 'true'
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check_dashboard.outputs.exists == 'true'
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        if: steps.check_dashboard.outputs.exists == 'true'
        working-directory: dashboard
        run: npx playwright test

      - name: Upload Playwright results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: test-results/playwright/
